# -----------------------------------------------------------------------------
# ORCHESTRATION PHASE
# Cross-category and summary generation prompts
# -----------------------------------------------------------------------------
orchestration:
  # Available variables: ${context}
  topic_detection: |
    Analyze the following category reports from today's AI news, research papers, social media, and GitHub trending collection, and identify the TOP 6 cross-category topics that represent the most significant developments today. If there are fewer than 6 distinct topics worth covering, return exactly 3 instead.

    ${context}

    For each top topic, provide:
    1. A concise, authoritative name (2-5 words)
    2. A rich, high-insight description (2-3 sentences) written as PLAIN TEXT without any links:
       - DO NOT include any markdown links or URLs.
       - Synthesize what happened across categories (news, research, open-source repos, community signals).
       - Explain the **strategic and technical insight** for an AI Director (e.g., impact on enterprise architecture, model deployment costs, agentic automation, or technical trade-offs).
       - Reference key sources, institutions, or repositories by name (e.g., "Google announced...", "A Stanford paper demonstrated...", "The koala73/worldmonitor repo emerged as...")
    3. A business implication (business_implication) explaining the impact on B2B/Enterprise markets and AI strategy (1-2 sentences).
    4. A trend velocity (trend_velocity) as a single word (e.g., "Emerging", "Accelerating", "Mainstream", "Fading").
    5. Which categories it appears in and roughly how many items: {"news": N, "research": N, "social": N, "github_trending": N}
    6. An importance score (0-100)

    IMPORTANT: Write descriptions as plain text WITHOUT any links. Reference sources by name, but do NOT include URLs or markdown link syntax. Links will be added automatically in a post-processing step.

    Example description format:
    "Google and Stanford announced major breakthroughs in compact reasoning architectures, while developers on GitHub launched breakout tools for local model orchestration. This shift signals a major industry push toward low-latency, privacy-first edge agents that dramatically reduce cloud API dependencies."

    Return your analysis as JSON:
    ```json
    {
      "topics": [
        {
          "name": "Topic Name",
          "description": "Plain text description with strategic insights and source references without any links.",
          "business_implication": "Explanation of the impact on B2B/Enterprise markets and AI strategy (1-2 sentences).",
          "trend_velocity": "A one-word indicator (e.g., 'Emerging', 'Accelerating', 'Mainstream', 'Fading')",
          "categories": {"news": 5, "research": 2, "social": 10, "github_trending": 4},
          "importance": 88
        }
      ]
    }
    ```

    Focus on genuinely cross-cutting themes representing the day's most significant AI developments and strategic insights.

    RELEASE-DATE GROUNDING (mandatory check for any topic that names or implies a model release):
    - For every model named in a candidate topic, look up the model in the AI ECOSYSTEM GROUNDING section at the top of your system prompt.
    - If the model's GA date is more than 7 days before the coverage date, do NOT frame the topic as a "release" or "launch". Frame it as ongoing development or ecosystem adaptation.
    - A "release" topic must center on a model whose GA date is on or within ~7 days of the coverage date.

  # Available variables: ${context}
  executive_summary: |
    Write a structured executive summary of today's AI news, research breakthroughs, and open-source landscape using markdown formatting, tailored for an AI Director.

    ${context}

    FORMAT YOUR SUMMARY LIKE THIS:

    #### The Bottom Line
    A single paragraph (2-3 sentences max) synthesizing the macro-trend of the day and its overall business/strategic impact for an AI Director.

    #### Strategic Shifts
    - **[Trend/Development]**: Focus on what is changing strategically or technologically, rather than just reciting news events. (1-2 sentences)
    - **[Trend/Development]**: (1-2 sentences explaining the shift)
    - (Include 2-4 bullet points covering the primary shifts in the landscape)

    #### Signals to Watch
    - **[Signal/Indicator]**: Early indicators, regulatory movements, or open-source momentum to monitor for future impact. (1-2 sentences)
    - (Include 2-3 bullet points)

    FORMATTING RULES:
    - Target audience: AI Director / VP of AI needing strategic clarity, technical depth, and actionable insights.
    - Use **bold** for company names (OpenAI, Google, Anthropic), product names, repository names, paper/model names, and key numbers/stats.
    - Use #### for section headers and - for bullet points.
    - Keep each bullet to 1-2 sentences maximum.
    - Only include sections that have relevant content today (skip empty sections).
    - Write in an authoritative, clear, and insight-driven executive tone - no hype or speculation.

    CRITICAL - AVOID REPETITION:
    - Review the PREVIOUS DAYS' COVERAGE section above carefully.
    - If a story was already a headline in previous days, do NOT present it as breaking news again.

    The summary should help a busy professional quickly scan and understand what's NEW and STRATEGICALLY IMPORTANT in AI today.

# -----------------------------------------------------------------------------
# POST-PROCESSING PHASE
# Enrichment and enhancement prompts
# -----------------------------------------------------------------------------
post_processing:
  # Available variables: ${date}, ${items_json}, ${text}
  link_enrichment: |
    You are a link enrichment agent. Add contextual "read more" links to summary text so readers can dive deeper into stories.

    LINKING STRATEGY (CRITICAL):
    1. Keep links SHORT (3-7 words max) - just the key action phrase
       - BAD (too long): "Google [published verification that GPT-5.2 solved an unsolved problem](/...)"
       - BAD (too long): "[announced Vera Rubin chips are in full production](/...)"
       - GOOD: "Google [published verification](/...) that GPT-5.2 solved a problem"
       - GOOD: "Nvidia [announced Vera Rubin chips](/...) are in full production"
    2. Link the ACTION/EVENT phrase, NOT the leading company/entity name
       - BAD: "[Google DeepMind](/...) announced robots"
       - GOOD: "Google DeepMind [announced Atlas robots](/...)"
    3. ONE link per distinct story/development in the text
    4. Link to the HIGHEST-RANKED item that covers that story (items are ordered by importance)
    5. Do NOT add new **bold** markers inside link labels. Preserve existing bold markers outside links.
    6. Preserve ALL original formatting exactly unless a link would require moving existing bold markers outside the link.
    7. For bullet points, link the key action/event after the entity prefix

    LINK FORMAT (exact format required):
    [descriptive phrase](/?date=${date}&category=CATEGORY#item-ITEMID)

    CRITICAL: The hash MUST start with "item-" followed by the item's id. Example:
      - Item with id "abc123def456" and category "news" becomes: /?date=${date}&category=news#item-abc123def456

    DATE: ${date}

    AVAILABLE ITEMS (ordered by importance - use id and category exactly as shown):
    ${items_json}

    TEXT TO ENRICH:
    ${text}

    OUTPUT (JSON only, no markdown code blocks):
    {
      "enriched_text": "Full text with links using format /?date=${date}&category=CATEGORY#item-actualItemId",
      "links": [{"phrase": "the linked phrase", "item_id": "actualItemId", "category": "news"}]
    }

    CRITICAL JSON FORMATTING:
    - Double quotes inside the text MUST be escaped as \"
    - Example: "the \"grief cycle\" concept" NOT "the "grief cycle" concept"
    - Newlines in the text must be escaped as \n
    - Use single quotes for emphasis when possible to avoid escaping issues

    Remember: The anchor MUST be #item-ID (with item- prefix). Link actions, not entities. Avoid bold markers inside links.

  # Available variables: ${report_date}, ${coverage_date}, ${existing_models}, ${news_items}
  ecosystem_enrichment: |
    You are an AI model release analyst. Review today's news items and identify any NEW model releases that should be added to our tracking database.

    Current date: ${report_date}
    Coverage date: ${coverage_date} (news is from this date)

    ## Models Already Tracked
    ${existing_models}

    ## Today's News Items
    ${news_items}

    ## Task
    Identify any NEW model releases announced in today's news that are NOT already in our tracked list.

    For each new release found, extract:
    1. provider: The company (openai, anthropic, google, x-ai, meta-llama, deepseek, mistralai)
    2. model_name: The model name (e.g., "GPT-5.3", "Claude-5", "Gemini-4")
    3. ga_date: The release/announcement date (YYYY-MM-DD format, use coverage date if "today")
    4. confidence: How confident you are this is a genuine new release (high/medium/low)
    5. source: Brief note about which news item mentions this

    Return JSON:
    ```json
    {
      "new_releases": [
        {
          "provider": "openai",
          "model_name": "GPT-5.3",
          "ga_date": "2026-01-14",
          "confidence": "high",
          "source": "OpenAI blog announcement"
        }
      ],
      "notes": "Any observations about model releases in today's news"
    }
    ```

    IMPORTANT:
    - Only include GENUINE new model releases (not updates, features, or news about existing models)
    - Do NOT include models already in our tracked list
    - Be conservative - only high/medium confidence releases should be added
    - If no new releases found, return empty array
